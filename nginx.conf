worker_processes auto;

events {
    worker_connections 1024;
}

http {
    include       mime.types;
    default_type  application/octet-stream;
    sendfile        on;
    keepalive_timeout  65;

    # ═══════════════════════════════════════════════════════════════
    # SOVEREIGN V15: GHOST-ADMIN MASKING GATEWAY [PHASE 4]
    # ═══════════════════════════════════════════════════════════════

    # 1. PUBLIC MEDIA SERVER (HLS & STATIC)
    server {
        listen 80;
        server_name fectok.com; # Synced with Cloudflare Pulse

        # HLS Video Garden (Professional Cloudflare R2 Direct Serving)
        location /media/ {
            alias /usr/share/nginx/html/media/; # Mapped to /var/www/html/media/videos on host
            add_header Access-Control-Allow-Origin *;
            add_header Accept-Ranges bytes;
            add_header X-Cache-Status $upstream_cache_status;
            
            # Ultra-Fast Edge Caching Logic
            expires 30d;
            add_header Cache-Control "public, max-age=31536000, immutable";
            
            autoindex off; # Secure for Production
        }

        # Backend Proxy (FastAPI)
        location / {
            proxy_pass http://backend_node:5000;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }

    # 2. GHOST ADMIN GATEWAY (Hidden Sub-domain)
    server {
        listen 80;
        server_name vazo.fectok.com; # Ghost-Admin Masking Active

        location / {
            # Redirect to admin backend/UI
            proxy_pass http://backend_node:5000;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }
    }
}

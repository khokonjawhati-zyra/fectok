worker_processes 1;

events {
    worker_connections 1024;
}

http {
    include       mime.types;
    default_type  application/octet-stream;
    sendfile        on;
    keepalive_timeout  65;

    # Sovereign V15 Master Gateway [SSL-READY]
    server {
        listen 80;
        server_name fectok.com;
        
        root /usr/share/nginx/html/user;
        index index.html;

        # 1. API & Core Pulse Gateway (Priority)
        location ~ ^/(api/|ws/|login|register|forgot_password|reset_password|verify_token|check_referral|verify_registration|auth|interaction) {
            set $backend_upstream "http://backend_node:5000";
            proxy_pass $backend_upstream;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection 'upgrade';
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # 2. Sound Engine Proxy (Port 9900 Bridge)
        location /sound_engine/ {
            proxy_pass http://167.71.193.34:9900/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # 3. Video Engine Proxy (Port 8080 Bridge)
        location /video_stream/ {
            proxy_pass http://167.71.193.34:8080/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # 4. Static User Panel (Catch-all)
        location / {
            try_files $uri $uri/ /index.html;
        }

        # Sovereign Media Storage (Direct Sync)
        location /sovereign_media_hub/ {
            alias /root/sovereign/sovereign_media_hub/;
            autoindex on;
        }

        # Admin Panel Route
        location /admin/ {
            alias /usr/share/nginx/html/admin/;
            try_files $uri $uri/ /admin/index.html;
        }
    }
}

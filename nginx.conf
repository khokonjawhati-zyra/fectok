user  nginx;
worker_processes  auto;
events { worker_connections  1024; }
http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;
    sendfile        on;
    
    # DNS Resolver to prevent stale IP caching for upstreams
    resolver 127.0.0.11 valid=30s;

    # 1. Main Portal (User Panel)
    server {
        listen 80;
        server_name fectok.com;
        
        root /usr/share/nginx/html/user;
        index index.html;
        
        # Security & Caching Pulse
        add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate, max-age=0";
        
        location / {
            try_files $uri $uri/ /index.html;
        }

        # Media Hub (Direct Access)
        location /media/ {
            alias /usr/share/nginx/html/media/;
            add_header Access-Control-Allow-Origin *;
            expires 30d;
        }

        # API & Core Pulse Gateway
        location ~ ^/(api/|ws/|login|register|forgot_password|reset_password|verify_token|check_referral|verify_registration|auth) {
            set $backend_upstream "http://backend_node:5000";
            proxy_pass $backend_upstream;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection 'upgrade';
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }
    }

    # 2. Ghost Admin Gate (Admin Panel)
    server {
        listen 80;
        server_name vazo.fectok.com;
        
        root /usr/share/nginx/html/admin;
        index index.html;

        location / {
            try_files $uri $uri/ /index.html;
        }

        # Admin Auth & Config Pulse
        location ~ ^/(api/|ws/|admin_auth_init|admin_auth_verify|verify_token|admin_config) {
            set $backend_upstream "http://backend_node:5000";
            proxy_pass $backend_upstream;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection 'upgrade';
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }
    }
}
